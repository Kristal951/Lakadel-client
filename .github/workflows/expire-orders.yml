name: Expire Pending Orders

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  

jobs:
  run-job:
    runs-on: ubuntu-latest
    steps:
      - name: Call expire orders API
        run: |
          curl -X POST https://lakadel.vercel.app/api/jobs/expire-pending-orders \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"